# fleet-up configuration
# All agent definitions, screen layouts, display modes

[display.samsung]
cols = 3
rows = 2

[display.macbook]
cols = 2
rows = 2

# ── Screens ──────────────────────────────────────────

[screens.command]
label = "Command"
workspace_samsung = 1
workspace_macbook = [1, 2]

[screens.training]
label = "Training"
workspace_samsung = 2
workspace_macbook = [2, 3]

[screens.media]
label = "Media Empire"
workspace_samsung = 3
workspace_macbook = [3, 4]

[screens.tools]
label = "Tools & Twin"
workspace_samsung = 4
workspace_macbook = [4, 5]

# ── Agents ───────────────────────────────────────────

[[agents]]
name = "adama"
label = "Adama | Fleet Commander"
repo = "~/Projects/leegonzales/servitor"
screen = "command"
slot = 1
claude = true

